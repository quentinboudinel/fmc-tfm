name: Release-plz

on:
  push:
    branches:
      - main

jobs:
  release-plz:
    name: Release-plz
    runs-on: ubuntu-latest
    container:
      image: rust:slim
    permissions:
      contents: write
      pull-requests: write
    steps:
      # release-plz's internal git-config step shells out to `gh` and `jq` to
      # look up commit-author identity; rust:slim ships neither, so every run
      # was failing with "gh: command not found" before this step existed.
      - name: Install git, GitHub CLI, and jq
        run: |
          apt-get update
          apt-get install -y --no-install-recommends git curl ca-certificates jq gnupg
          install -d -m 0755 /etc/apt/keyrings
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg -o /etc/apt/keyrings/githubcli-archive-keyring.gpg
          chmod go+r /etc/apt/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" > /etc/apt/sources.list.d/github-cli.list
          apt-get update
          apt-get install -y gh

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # actions/checkout's own safe.directory fix-up only applies to its own
      # post-job cleanup step inside this container job, not to later steps,
      # so release-plz's git calls were failing with "detected dubious
      # ownership in repository".
      - name: Mark workspace as safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Run release-plz
        uses: release-plz/action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
