[workspace]
changelog_update = true
git_tag_enable = true
git_release_enable = true
# fmc-tfm is a GUI desktop app, not a library meant for crates.io. CI still
# tags releases and publishes GitHub Releases with changelogs; it just
# doesn't run `cargo publish` (which would otherwise fail every run without
# a CARGO_REGISTRY_TOKEN secret).
publish = false

[changelog]
body = """
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {{ commit.message | upper_first }} ({{ commit.id | truncate(length=7, end="") }})\
{% endfor %}
{% endfor %}
"""
